<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEC Sdn Bhd - Scheduler Portal</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="topbar">
  <div class="brand"><strong>AEC Sdn Bhd</strong><span>Scheduler Portal</span></div>
  <div class="userbox">
    <span id="userName"></span>
    <button class="logout" onclick="logout()">Log Out</button>
  </div>
</div>
<div class="container">

  <div class="card">
    <div class="flex-between" style="align-items:flex-start;">
      <h2 style="border:none;margin:0;padding:0;">New Job Assignment</h2>
      <div style="min-width:170px;">
        <label style="text-align:right;">Job Sheet No.</label>
        <input type="text" id="job_sheet_no" value="K" style="text-align:right;font-weight:700;margin-bottom:0;">
      </div>
    </div>
    <div style="height:14px;"></div>
    <form id="jobForm">
      <div class="grid2">
        <div>
          <label>Customer Name</label>
          <input type="text" id="customer_name" required>
        </div>
        <div>
          <label>Contact Number</label>
          <input type="tel" id="customer_phone" required>
        </div>
      </div>
      <label>Customer Address / Site</label>
      <textarea id="customer_address" placeholder="Full address for the technician to locate the site"></textarea>
      <label>Nature of Complaint</label>
      <textarea id="complaint_description" placeholder="Describe what the customer reported (e.g. aircon not cooling, water leaking, noisy unit...)" required></textarea>
      <div class="grid2">
        <div>
          <label>Assign To Technician</label>
          <select id="technician_id" required>
            <option value="">-- Select Technician / Team --</option>
          </select>
        </div>
        <div>
          <label>Preferred Service Date (optional)</label>
          <input type="date" id="service_date">
        </div>
      </div>
      <button class="btn" type="submit" id="submitBtn">Assign Job to Technician</button>
      <span class="muted" id="submitStatus" style="margin-left:12px;"></span>
    </form>
  </div>

  <div class="card">
    <div class="flex-between">
      <h2 style="border:none;margin:0;padding:0;">Jobs I've Scheduled</h2>
      <select id="statusFilter" onchange="loadJobs()">
        <option value="">All statuses</option>
        <option value="assigned">Assigned (not started)</option>
        <option value="submitted">Submitted</option>
        <option value="reviewed">Reviewed</option>
        <option value="approved">Approved</option>
        <option value="sent">Sent</option>
      </select>
    </div>
    <table class="list" id="jobsTable">
      <thead><tr><th>Job Ref</th><th>Customer</th><th>Technician</th><th>Complaint</th><th>Status</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>
async function init() {
  const me = await fetch('/api/me').then(r => r.json());
  if (!me.user || me.user.role !== 'scheduler') { window.location.href = '/'; return; }
  document.getElementById('userName').textContent = me.user.name;
  await loadTechnicians();
  loadJobs();
}

async function loadTechnicians() {
  const data = await fetch('/api/technicians').then(r => r.json());
  const sel = document.getElementById('technician_id');
  (data.technicians || []).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });
}

function toast(msg, isErr) {
  const t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

document.getElementById('jobForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  document.getElementById('submitStatus').textContent = 'Submitting...';

  const body = {
    job_sheet_no: document.getElementById('job_sheet_no').value || 'K',
    customer_name: document.getElementById('customer_name').value,
    customer_phone: document.getElementById('customer_phone').value,
    customer_address: document.getElementById('customer_address').value,
    complaint_description: document.getElementById('complaint_description').value,
    technician_id: document.getElementById('technician_id').value,
    service_date: document.getElementById('service_date').value
  };

  try {
    const res = await fetch('/api/jobs', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to assign job');
    toast('Job ' + data.job_ref + ' assigned.');
    document.getElementById('jobForm').reset();
    document.getElementById('job_sheet_no').value = 'K';
    loadJobs();
  } catch (err) {
    toast(err.message, true);
  }
  document.getElementById('submitStatus').textContent = '';
  btn.disabled = false;
});

async function loadJobs() {
  const data = await fetch('/api/reports').then(r => r.json());
  const filter = document.getElementById('statusFilter').value;
  const rows = (data.reports || []).filter(r => !filter || r.status === filter);
  const tbody = document.querySelector('#jobsTable tbody');
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.job_ref}</td>
      <td>${r.customer_name}</td>
      <td>${r.technician_name}</td>
      <td>${(r.complaint_description || '').slice(0, 60)}${(r.complaint_description || '').length > 60 ? '…' : ''}</td>
      <td><span class="badge ${r.status}">${r.status}</span></td>
    </tr>`).join('') || '<tr><td colspan="5" class="muted">No jobs scheduled yet.</td></tr>';
}

function logout() {
  fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/');
}

init();
</script>
</body>
</html>
